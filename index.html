<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야자 자리 배치 프로그램</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#118A8E">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            /* 🎨 Modern Teal & Cyan Theme (Travelin Inspired) */
            --primary: #118A8E;
            /* Deep Teal */
            --primary-dark: #0B6E71;
            --secondary: #E0F2F1;
            /* Mint white */

            --bg-canvas: #F5FAFA;
            /* Cool off-white */
            --card-bg: #FFFFFF;

            --text-main: #1D2D2E;
            /* Dark teal-gray */
            --text-sub: #5F7D7E;
            --text-muted: #8FA4A5;

            --border: #D1E5E6;
            /* Soft teal border */
            --border-focus: #118A8E;

            /* Modern Soft Shadows */
            --shadow-sm: 0 2px 12px rgba(17, 138, 142, 0.05);
            --shadow-md: 0 8px 32px rgba(17, 138, 142, 0.12);
            --shadow-lg: 0 16px 48px rgba(17, 138, 142, 0.15);

            --drag-over: #F0FBFA;

            /* Attendance Table Colors */
            --table-header: #F1F9F9;
            --table-border: #E6EEEE;
            --table-row-hover: #F8FCFC;

            /* Room modern colors (Teal based) */
            --room-2-3: #118A8E;
            /* Theme Primary */
            --room-2-4: #4DB6AC;
            /* Teal 300 */
            --room-2-5: #009688;
            /* Teal 500 */
            --room-2-6: #00796B;
            /* Teal 700 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background-color: var(--bg-canvas);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(17, 138, 142, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(77, 182, 172, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 150, 136, 0.05) 0%, transparent 60%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 1300px;
            margin: 0 auto 40px;
            text-align: center;
            padding: 48px 40px;
            background: linear-gradient(135deg, var(--primary) 0%, #0D6F72 100%);
            border-radius: 36px;
            box-shadow: var(--shadow-md);
            border: none;
            position: relative;
            overflow: hidden;
            color: white;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.04em;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Day and Period Buttons Container to look like a green pill */
        #dayButtons,
        #periodButtons {
            background: var(--primary);
            padding: 6px;
            border-radius: 50px;
            gap: 4px;
            border: none;
            box-shadow: inset 0 2px 6px rgba(11, 110, 113, 0.2);
        }

        /* Turn day/period buttons into segment toggles */
        #dayButtons .day-btn,
        #periodButtons .day-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            border: none;
            box-shadow: none;
            padding: 10px 20px;
        }

        #dayButtons .day-btn:hover,
        #periodButtons .day-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: none;
            border-color: transparent;
        }

        #dayButtons .day-btn.active,
        #periodButtons .day-btn.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(11, 110, 113, 0.3);
            font-weight: 800;
            border: none;
        }

        .btn {
            padding: 11px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-sub);
            font-size: 0.93rem;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background: var(--secondary);
            color: var(--primary-dark);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #0D6F72 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 16px rgba(17, 138, 142, 0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #095C5E 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 138, 142, 0.35);
        }

        .btn-danger {
            background: #FFF5F5;
            color: #E07070;
            border: 1.5px solid #F5D0D0;
        }

        .btn-danger:hover {
            background: #FFE8E8;
            color: #C05050;
        }

        /* Default active fallback */
        .day-btn.active {
            background: white;
            color: var(--primary-dark);
            border: none;
            box-shadow: 0 2px 8px rgba(11, 110, 113, 0.3);
        }

        /* Layout Grid */
        .seating-container {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .classroom-section {
            background: var(--card-bg);
            padding: 36px 40px;
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .classroom-section:hover {
            box-shadow: var(--shadow-md);
        }

        /* little petal deco */
        .classroom-section::after {
            content: '';
            position: absolute;
            bottom: -30px;
            right: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(17, 138, 142, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-6x5 {
            display: grid;
            grid-template-columns: 1fr 1fr 40px 1fr 1fr 40px 1fr 1fr;
            row-gap: 14px;
            margin: 28px 0;
        }

        .seat {
            aspect-ratio: 1 / 1.15;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(160deg, #FDF4EB 0%, #F8EBE2 100%);
            font-size: 0.85rem;
            position: relative;

            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: 0 2px 8px rgba(180, 100, 80, 0.06);
        }

        .seat:not(.empty):hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(17, 138, 142, 0.2);
            border-color: var(--primary);
            z-index: 10;
        }

        .seat.empty {
            border: 1.5px dashed var(--text-muted);
            background: #FAEFDF;
            box-shadow: none;
            cursor: default;
            opacity: 0.5;
        }

        .seat.drag-over {
            background: var(--secondary);
            border-color: var(--primary);
            border-style: solid;
            transform: scale(1.04);
        }

        .teacher-desk {
            width: 55%;
            height: 40px;
            background: #8B6552;
            border: 3px solid #634333;
            border-radius: 8px;
            margin: 20px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            letter-spacing: 0.8em;
            font-size: 1.1rem;
            box-shadow: var(--shadow-sm);
        }

        .student-id {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 2px;
            pointer-events: none;
        }

        .student-name {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text-main);
            pointer-events: none;
            letter-spacing: -0.04em;
        }

        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(17, 138, 142, 0.95);
            backdrop-filter: blur(8px);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 700;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 12px;
            width: fit-content;
            max-width: 90vw;
            white-space: normal;
            word-break: keep-all;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            #toast {
                padding: 12px 20px;
                bottom: 30px;
                font-size: 0.9rem;
            }
        }

        .spacer {
            pointer-events: none;
        }

        /* Info text */
        .info-text {
            font-size: 0.88rem;
            color: var(--text-sub);
            background: rgba(255, 248, 244, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Attendance List */
        .attendance-container {
            max-width: 1000px;
            margin: 0 auto;
            display: none;
            flex-direction: column;
            gap: 36px;
        }

        .attendance-section {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid var(--border);
        }

        .attendance-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 16px;
            font-size: 0.95rem;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 14px 16px;
            text-align: center;
            border-bottom: 1px solid var(--table-border);
        }

        .attendance-table th {
            background-color: var(--table-header);
            font-weight: 700;
            color: var(--text-sub);
        }

        .attendance-table tr:last-child td {
            border-bottom: none;
        }

        .attendance-table tr:hover td {
            background-color: var(--table-row-hover);
        }

        .attendance-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .col-num {
            width: 50px;
        }

        .col-id {
            width: 90px;
        }

        .col-name {
            width: 80px;
        }

        .col-check {
            width: 100px;
            white-space: nowrap;
        }

        .col-remark {
            width: auto;
        }

        .attendance-remark {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #FFFBF8;
            color: var(--text-main);
        }

        .attendance-remark:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(17, 138, 142, 0.15);
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--primary);
            padding: 6px;
            border-radius: 50px;
            border: none;
            box-shadow: inset 0 2px 6px rgba(11, 110, 113, 0.2);
        }

        .toggle-btn {
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: none;
        }

        .toggle-btn.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(11, 110, 113, 0.3);
            font-weight: 800;
        }

        .gas-config {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .gas-config input {
            flex: 1;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            background: #FFFBF8;
        }

        .btn-save-sheet {
            margin-top: 20px;
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7DD9C0 0%, #5CC4AB 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(93, 196, 170, 0.3);
        }

        .btn-save-sheet:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }

        .btn-save-sheet:disabled {
            background: #D0C8C2;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Classroom Header */
        .classroom-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .room-title {
            font-size: 2.1rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        .room-notice {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .room-meta {
            font-size: 0.92rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #0D6F72 100%);
            padding: 6px 18px;
            border-radius: 50px;
            letter-spacing: -0.01em;
            white-space: nowrap;
            align-self: flex-start;
            box-shadow: 0 3px 10px rgba(232, 115, 154, 0.3);
        }

        /* Room color top-bar accent */
        .classroom-section[data-room="2-3"] {
            border-top: 5px solid var(--room-2-3);
        }

        .classroom-section[data-room="2-4"] {
            border-top: 5px solid var(--room-2-4);
        }

        .classroom-section[data-room="2-5"] {
            border-top: 5px solid var(--room-2-5);
        }

        .classroom-section[data-room="2-6"] {
            border-top: 5px solid var(--room-2-6);
        }

        .room-title.color-2-3 {
            color: var(--room-2-3);
        }

        .room-title.color-2-4 {
            color: var(--room-2-4);
        }

        .room-title.color-2-5 {
            color: var(--room-2-5);
        }

        .room-title.color-2-6 {
            color: var(--room-2-6);
        }

        .print-title {
            display: none;
        }

        /* Loading Overlay */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid var(--secondary);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loadingText {
            margin-top: 20px;
            font-weight: 800;
            color: var(--text-main);
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        /* Custom Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(29, 45, 46, 0.6);
            backdrop-filter: blur(5px);
            z-index: 20000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 28px;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-message {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 28px;
            line-height: 1.5;
            word-break: keep-all;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            min-width: 100px;
        }

        .modal-btn-confirm {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(17, 138, 142, 0.3);
        }

        .modal-btn-confirm:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .modal-btn-cancel {
            background: var(--secondary);
            color: var(--primary);
        }

        .modal-btn-cancel:hover {
            background: #D1E5E6;
        }

        /* Print Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            header,
            button,
            .controls,
            .view-toggle,
            #toast,
            .info-text,
            .blossom-container,
            .tree-bg,
            .login-overlay,
            .gas-config {
                display: none !important;
            }

            .seating-container {
                gap: 0 !important;
                margin: 0 !important;
                max-width: none !important;
                display: block !important;
            }

            .classroom-section {
                box-shadow: none !important;
                border-radius: 0 !important;
                margin: 0 !important;
                padding: 8mm !important;
                page-break-after: always !important;
                width: 210mm !important;
                height: 297mm !important;
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
                background: white !important;
                border: none !important;
                overflow: hidden !important;
                transform: none !important;
            }

            .print-title {
                display: block !important;
                font-size: 1.8rem !important;
                font-weight: 800 !important;
                text-align: center !important;
                margin-bottom: 5mm !important;
                color: #000 !important;
                width: 100% !important;
            }

            .classroom-section[data-room="2-5"] {
                border-top: 8px solid #f59e0b !important;
            }

            .classroom-section[data-room="2-6"] {
                border-top: 8px solid #D0021B !important;
            }

            .classroom-section[data-room="2-3"] {
                border-top: 8px solid #4A90E2 !important;
            }

            .classroom-section[data-room="2-4"] {
                border-top: 8px solid #50E3C2 !important;
            }

            .classroom-section[data-room="1-5"] {
                border-top: 8px solid #f59e0b !important;
            }

            .classroom-section[data-room="1-6"] {
                border-top: 8px solid #f43f5e !important;
            }

            .classroom-section[data-room="1-3"] {
                border-top: 8px solid #6366f1 !important;
            }

            .classroom-section[data-room="1-4"] {
                border-top: 8px solid #10b981 !important;
            }

            .classroom-header {
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                border-bottom: 2px solid #e2e8f0 !important;
                margin-bottom: 5mm !important;
                padding-bottom: 3mm !important;
                flex-shrink: 0 !important;
            }

            .room-title {
                font-size: 1.8rem !important;
                font-weight: 900 !important;
                color: #0f172a !important;
            }

            .room-notice {
                display: none !important;
            }

            .room-meta {
                font-size: 0.95rem !important;
                color: #475569 !important;
                font-weight: 700 !important;
            }

            .blackboard {
                height: 30px !important;
                width: 55% !important;
                margin: 0 auto 4mm !important;
                flex-shrink: 0 !important;
                background: #1e293b !important;
                color: white !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                font-size: 1rem !important;
            }

            .teacher-desk {
                display: flex !important;
                height: 35px !important;
                width: 55% !important;
                margin: 5mm auto 0 !important;
                background: #e2e8f0 !important;
                color: #0f172a !important;
                border: 2px solid #94a3b8 !important;
                align-items: center !important;
                justify-content: center !important;
                font-size: 1.1rem !important;
                font-weight: 800 !important;
                border-radius: 6px !important;
                letter-spacing: 1em !important;
            }

<body>
    <div id="loginOverlay" class="login-overlay">

                <button id="modalConfirm" class="modal-btn modal-btn-confirm">확인</button>
            </div>

    <div id="mainApp" style="display: none;">

                        초기화</button>

                </div>
                <input type="hidden" id="gasUrl"
                    value="https://script.google.com/macros/s/AKfycbz9uHzhjwpUvEY1c35G4LH7lEi_pkRin9V9BzWXdPFFul5ty919BgM0aTl_qDgqOebB/exec">
                <input type="hidden" id="gasBackupUrl"
                    value="https://script.google.com/macros/s/AKfycbxvmXW2lKnfqYWSW8DiXbucv0KHSn2sxoSClRXJq7qnlPzXkPdytY9b33J6K-SC3UEb/exec">
                <div class="info-text"
                    style="display: flex; flex-wrap: wrap; justify-content: space-between; width: 100%;">
                    <div style="display: flex; gap: 8px;">
                        <span>💡</span>
                        <span>출석 체크 중 불편한 부분이나 개선할 것들이 있다면 2학년부 박상현T에게 말씀해주세요.</span>
                        <button class="btn" style="padding:4px 12px; font-size:0.8rem; height: 28px; line-height: 1;" onclick="refreshStudentList()">🔄 명단 갱신</button>
                    </div>
                    <div
                        style="font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; margin-left: auto;">
                        👤 <span id="displaySupervisorName"></span> 선생님
                        <button onclick="handleLogout()"
                            style="background: white; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; color: var(--text-main); font-weight: 600; box-shadow: var(--shadow-sm); transition: all 0.2s;">로그아웃</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="seating-container active" id="seatingDisplay"></div>
        <div class="attendance-container" id="attendanceDisplay"></div>
        <div id="toast"><span>✅</span> 배치 정보가 자동 저장되었습니다.</div>
    </div> <!-- Close mainApp -->

    <div id="loadingOverlay">
        <div class="loader"></div>
        <div id="loadingText">출석 정보를 동기화하고 있습니다...</div>
    </div>

    <script>
        let supervisorName = sessionStorage.getItem('yajaSupervisor') || '';

        document.addEventListener('DOMContentLoaded', async () => {
            // 초기 로딩 시 캐시된 명단이 있으면 즉시 표시하여 체감 속도 향상
            const hasCache = await fetchGlobalData(false);

            if (supervisorName) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('displaySupervisorName').innerText = supervisorName;
                
                if (hasCache) {
                    renderSeating();
                } else {
                    // 캐시가 없으면 서버에서 받아옴
                    showLoading();
                    const success = await fetchGlobalData(true);
                    hideLoading();
                    if (success) renderSeating();
                    else showAlert('명단을 불러오지 못했습니다. 네트워크를 확인해주세요.');
                }
            }
        });

        async function handleLogin() {
            const nameInput = document.getElementById('teacherNameInput').value.trim();
            const allowedTeachers = ['유연주', '김유민', '송세윤', '김수환', '최철화', '장순지', '박상현', '오창현', '전봉수', '길현진', '이승호', '박종선', '홍남숙', '김지현', '김동석', '이상현', '김소연', '주현희', '이준영', '김인영', '양강훈', '이현정'];

            if (!nameInput) {
                showAlert('감독 교사 성함을 입력해주세요.');
                return;
            }
            if (!allowedTeachers.includes(nameInput)) {
                showAlert('등록되지 않은 선생님입니다. 입력하신 성함을 다시 한 번 확인해주세요.');
                return;
            }

            showLoading();
            const success = await fetchGlobalData();
            hideLoading();

            if (!success) {
                showAlert('구글 시트에서 학생 명단을 가져오는 데 실패했습니다.');
                return;
            }

            supervisorName = nameInput;
            sessionStorage.setItem('yajaSupervisor', supervisorName);
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displaySupervisorName').innerText = supervisorName;
            renderSeating();
        }

        async function handleLogout() {
            showConfirm('로그아웃 하시겠습니까?', () => {
                sessionStorage.removeItem('yajaSupervisor');
                // 로그아웃 시 보안을 위해 학생 명단 캐시도 삭제할 수 있지만, 
                // 속도를 위해 남겨두는 편이 좋습니다. (필요 시 아래 주석 해제)
                // localStorage.removeItem('yajaStudentList');
                supervisorName = '';
                document.getElementById('teacherNameInput').value = '';
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            });
        }

        async function refreshStudentList() {
            showLoading();
            const success = await fetchGlobalData(true); // 강제 새로고침
            hideLoading();
            if (success) {
                showToast("학생 명단이 성공적으로 갱신되었습니다.");
                if (currentMode === 'seating') renderSeating();
                else renderAttendance();
            } else {
                showAlert("명단 갱신에 실패했습니다. 인터넷 연결을 확인해주세요.");
            }
        }
        // 시트 데이터 캐싱 로직
        let globalData = [];

        async function fetchGlobalData(force = false) {
            // 강제 갱신이 아니고 캐시가 존재하면 캐시 데이터 사용 (속도 향상)
            if (!force) {
                const cached = localStorage.getItem('yajaStudentList');
                if (cached) {
                    try {
                        globalData = JSON.parse(cached);
                        // 데이터가 정상적인지 간단히 확인
                        if (Array.isArray(globalData) && globalData.length > 0) {
                            return true;
                        }
                    } catch(e) { 
                        localStorage.removeItem('yajaStudentList');
                    }
                }
            }

            const gasUrl = document.getElementById('gasUrl').value.trim();
            try {
                // 타입 아웃 15초 설정
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                const response = await fetch(`${gasUrl}?action=getStudents`, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    globalData = data.map(s => {
                        const obj = {};
                        for (let key in s) {
                            obj[key] = (s[key] === null || s[key] === undefined) ? "" : String(s[key]).trim();
                        }
                        return obj;
                    });
                    
                    // 성공적으로 받아오면 로컬 스토리지에 저장
                    localStorage.setItem('yajaStudentList', JSON.stringify(globalData));
                    console.log("학생 명단 서버 로드 완료:", globalData.length, "명");
                    return true;
                }
            } catch (e) {
                console.error("Fetch students error:", e);
                // 캐시조차 없을 때만 에러 메시지
                if (!localStorage.getItem('yajaStudentList')) {
                    showAlert("서버에서 학생 명단을 가져오는 데 실패했습니다.");
                }
            }
            return false;
        }

        // 오늘 요일 자동 감지 및 초기값 설정
        const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
        const todayIdx = new Date().getDay();
        const initialDay = (todayIdx >= 1 && todayIdx <= 5) ? daysMap[todayIdx] : '월';

        let currentDay = initialDay;
        let currentMode = 'seating';
        let currentPeriod = '1';

        function selectPeriod(btn) {
            document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPeriod = btn.dataset.period;
            if (currentMode === 'attendance') renderAttendance();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnSeating').classList.toggle('active', mode === 'seating');
            document.getElementById('btnAttendance').classList.toggle('active', mode === 'attendance');

            const seatingDisp = document.getElementById('seatingDisplay');
            const attendanceDisp = document.getElementById('attendanceDisplay');

            if (mode === 'seating') {
                seatingDisp.style.display = 'flex';
                seatingDisp.classList.add('active');
                attendanceDisp.style.display = 'none';
                attendanceDisp.classList.remove('active');
                document.getElementById('btnResetArrangement').style.display = 'inline-block';
                document.getElementById('btnResetAttendance').style.display = 'none';
                renderSeating();
            } else {
                seatingDisp.style.display = 'none';
                seatingDisp.classList.remove('active');
                attendanceDisp.style.display = 'flex';
                attendanceDisp.classList.add('active');
                document.getElementById('btnResetArrangement').style.display = 'none';
                document.getElementById('btnResetAttendance').style.display = 'inline-block';
                renderAttendance();
            }
        }

        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDay = btn.dataset.day;
                if (currentMode === 'seating') renderSeating();
                else renderAttendance();
            });
        });

        function getRoomStudents(day) {
            const col1 = `${day}1`;
            const col2 = `${day}2`;
            const bothP = globalData.filter(s => s[col1] === '1' && s[col2] === '1').sort((a, b) => a.학번.localeCompare(b.학번));
            const half = Math.ceil(bothP.length / 2);

            let p1Only = globalData.filter(s => s[col1] === '1' && s[col2] !== '1').sort((a, b) => a.학번.localeCompare(b.학번));
            let p2Only = globalData.filter(s => s[col1] !== '1' && s[col2] === '1').sort((a, b) => a.학번.localeCompare(b.학번));

            // 목요일 예외 처리: 2-5반 1교시 학생 중 학번 기준 뒷번호 7명을 2-6반으로 이동
            if (day === '목' && p1Only.length > 7) {
                const moveCount = 7;
                const p1For2_5 = p1Only.slice(0, p1Only.length - moveCount);
                const p1For2_6 = p1Only.slice(p1Only.length - moveCount);
                return {
                    '2-3': bothP.slice(0, half),
                    '2-4': bothP.slice(half),
                    '2-5': p1For2_5,
                    '2-6': [...p1For2_6, ...p2Only].sort((a, b) => a.학번.localeCompare(b.학번))
                };
            }

            // 수요일 예외 처리: 정하윤(20221), 김규민(20902) 학생을 2-5반으로 이동
            if (day === '수') {
                const moveIds = ['20221', '20902'];
                const moveStudents = p2Only.filter(s => moveIds.includes(s.학번));
                p2Only = p2Only.filter(s => !moveIds.includes(s.학번));
                p1Only = [...p1Only, ...moveStudents].sort((a, b) => a.학번.localeCompare(b.학번));
            }

            // 금요일 예외 처리: 김규민(20902), 이소민(20214), 최창아(20525), 신채연(20915) 2-5반으로 이동
            if (day === '금') {
                const moveIds = ['20902', '20214', '20525', '20915'];
                const moveStudents = p2Only.filter(s => moveIds.includes(s.학번));
                p2Only = p2Only.filter(s => !moveIds.includes(s.학번));
                p1Only = [...p1Only, ...moveStudents].sort((a, b) => a.학번.localeCompare(b.학번));
            }

            return {
                '2-3': bothP.slice(0, half),
                '2-4': bothP.slice(half),
                '2-5': p1Only,
                '2-6': p2Only
            };
        }

        function renderSeating() {
            const display = document.getElementById('seatingDisplay');
            display.innerHTML = '';
            const roomStudents = getRoomStudents(currentDay);
            const rooms = ['2-3', '2-4', '2-5', '2-6'];

            // 현재 실제 요일 계산 (0: 일요일, 1: 월요일, ..., 6: 토요일)
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const todayIndex = new Date().getDay();
            const actualToday = daysMap[todayIndex];
            const isToday = currentDay === actualToday;

            rooms.forEach(roomName => {
                const students = roomStudents[roomName];
                if (students.length === 0) return;

                const storageKey = `yajaArrangement_${currentDay}_${roomName}`;
                let savedIds = JSON.parse(localStorage.getItem(storageKey));
                let gridSeats = new Array(30).fill(null);
                const currentStudentMap = {};
                students.forEach(s => currentStudentMap[s.학번] = s);

                if (savedIds) {
                    savedIds.forEach((id, idx) => {
                        if (id && currentStudentMap[id]) {
                            gridSeats[idx] = currentStudentMap[id];
                            delete currentStudentMap[id];
                        }
                    });
                    fillZigzag(gridSeats, Object.values(currentStudentMap).sort((a, b) => a.학번.localeCompare(b.학번)));
                } else {
                    fillZigzag(gridSeats, students);
                }
                saveToStorage(roomName, gridSeats);

                const section = document.createElement('div');
                section.className = 'classroom-section';
                section.setAttribute('data-room', roomName);
                const roomColorClass = 'color-' + roomName;
                section.innerHTML = `
            <div class="print-title">2학년 자기주도적 학습 자리 배치표</div>
            <div class="classroom-header">
                <div class="header-left">
                    <span class="room-title ${roomColorClass}">${roomName}반</span>
                    <span class="room-notice">3/16(월) 이전까지는 자유롭게 위치를 변경할 수 있습니다. 변경사항이 있으면 2학년부 박상현 선생님에게 오세요.</span>
                </div>
                <span class="room-meta">${currentDay}요일 | ${students.length}명</span>
            </div>
            <div class="grid-6x5"></div>
            <div class="teacher-desk">교탁</div>
        `;

                const grid = section.querySelector('.grid-6x5');
                gridSeats.forEach((student, i) => {
                    const col = i % 6;
                    if (col === 2 || col === 4) grid.appendChild(Object.assign(document.createElement('div'), { className: 'spacer' }));

                    const seat = document.createElement('div');
                    seat.className = 'seat' + (student ? '' : ' empty');
                    seat.setAttribute('draggable', student ? 'true' : 'false');
                    seat.setAttribute('data-index', i);
                    seat.innerHTML = "";
                    if (student) {
                        seat.innerHTML += `
                    <div class="student-id">${student.학번}</div>
                    <div class="student-name">${student.이름}</div>
                `;
                    }
                    seat.addEventListener('dragstart', handleDragStart);
                    seat.addEventListener('dragover', handleDragOver);
                    seat.addEventListener('dragleave', handleDragLeave);
                    seat.addEventListener('drop', handleDrop);
                    grid.appendChild(seat);
                });
                display.appendChild(section);
            });
        }

        function fillZigzag(grid, students) {
            let sIdx = 0;
            for (let row = 4; row >= 0; row--) {
                for (let col = 0; col < 6; col++) {
                    const idx = row * 6 + col;
                    if (!grid[idx] && (row + col) % 2 === 0 && sIdx < students.length) grid[idx] = students[sIdx++];
                }
            }
            if (sIdx < students.length) {
                for (let row = 4; row >= 0; row--) {
                    for (let col = 0; col < 6; col++) {
                        const idx = row * 6 + col;
                        if (!grid[idx] && sIdx < students.length) grid[idx] = students[sIdx++];
                    }
                }
            }
        }

        let draggedElement = null;
        function handleDragStart(e) { draggedElement = this; e.dataTransfer.setData('text/plain', this.dataset.index); this.style.opacity = '0.4'; }
        function handleDragOver(e) { e.preventDefault(); this.classList.add('drag-over'); }
        function handleDragLeave() { this.classList.remove('drag-over'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (draggedElement) draggedElement.style.opacity = '1';
            const sIdx = parseInt(e.dataTransfer.getData('text/plain'));
            const tIdx = parseInt(this.dataset.index);
            const sRoom = draggedElement.parentElement.parentElement.dataset.room;
            const tRoom = this.parentElement.parentElement.dataset.room;
            if (sRoom !== tRoom || sIdx === tIdx) return;
            const k = `yajaArrangement_${currentDay}_${sRoom}`;
            let arr = JSON.parse(localStorage.getItem(k));
            [arr[sIdx], arr[tIdx]] = [arr[tIdx], arr[sIdx]];
            localStorage.setItem(k, JSON.stringify(arr));
            showToast();
            renderSeating();
        }
        function saveToStorage(roomName, gridSeats) {
            localStorage.setItem(`yajaArrangement_${currentDay}_${roomName}`, JSON.stringify(gridSeats.map(s => s ? s.학번 : "")));
        }
        function showToast(msg = '배치가 저장되었습니다.') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<span>✅</span> <span>${msg}</span>`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        function resetArrangement() {
            showConfirm('현재 요일의 모든 배치를 초기화하시겠습니까?', () => {
                Object.keys(localStorage).filter(k => k.startsWith(`yajaArrangement_${currentDay}_`)).forEach(k => localStorage.removeItem(k));
                showToast('배치가 초기화되었습니다.');
                renderSeating();
            });
        }
        function resetAttendance() {
            showConfirm(`현재 요일(${currentDay}요일)의 출석 체크 내역을 모두 초기화하시겠습니까?`, () => {
                Object.keys(sessionStorage).filter(k => k.startsWith(`att_${currentDay}_`) || k.startsWith(`rem_${currentDay}_`)).forEach(k => sessionStorage.removeItem(k));
                showToast('출석 데이터가 초기화되었습니다.');
                renderAttendance();
            });
        }

        const loadingMessages = [
            "선생님, 오늘 하루도 고생 많으셨습니다! ☕",
            "학생들 출석 현황을 꼼꼼하게 확인하고 있어요! 🕵️‍♂️",
            "구글 시트와 열심히 요정들이 소통하는 중입니다... 📡",
            "잠시만요! 최신 야자 명단을 준비하고 있습니다 ⏳",
            "야자 감독 화이팅! 데이터를 안전하게 가져오고 있어요 🚀",
            "출석부가 곧 도착합니다. 잠시만 기다려주세요! 📬"
        ];

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                const randomMsg = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
                document.getElementById('loadingText').innerText = randomMsg;
                overlay.style.display = 'flex';
            }
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.style.display = 'none';
        }

        function showAlert(msg) {
            const modal = document.getElementById('customModal');
            document.getElementById('modalMessage').innerText = msg;
            document.getElementById('modalCancel').style.display = 'none';
            const confirmBtn = document.getElementById('modalConfirm');
            confirmBtn.onclick = () => { modal.style.display = 'none'; };
            modal.style.display = 'flex';
        }

        function showConfirm(msg, onConfirm) {
            const modal = document.getElementById('customModal');
            document.getElementById('modalMessage').innerText = msg;
            document.getElementById('modalCancel').style.display = 'block';
            document.getElementById('modalCancel').onclick = () => { modal.style.display = 'none'; };
            const confirmBtn = document.getElementById('modalConfirm');
            confirmBtn.onclick = () => {
                modal.style.display = 'none';
                if (onConfirm) onConfirm();
            };
            modal.style.display = 'flex';
        }

        function getTodayDateString() {
            // "2026. 3. 19." 형식으로 통일 (끝에 점 포함)
            const d = new Date();
            return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
        }

        const fetchingRooms = new Set();
        async function fetchAttendanceFromSheet(roomName) {
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl || fetchingRooms.has(roomName)) return;

            const dateStr = getTodayDateString();
            const cacheKey = `synced_${dateStr}_${currentDay}_${currentPeriod}_${roomName}`;

            if (sessionStorage.getItem(cacheKey)) return;

            fetchingRooms.add(roomName);
            showLoading();

            try {
                const url = `${gasUrl}${gasUrl.includes('?') ? '&' : '?'}date=${encodeURIComponent(dateStr)}&day=${encodeURIComponent(currentDay)}&period=${encodeURIComponent(currentPeriod + '교시')}&room=${encodeURIComponent(roomName)}`;

                // 타임아웃 처리 추가 (10초)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                const results = await response.json();

                if (results && typeof results === 'object') {
                    Object.keys(results).forEach(studentId => {
                        const data = results[studentId];
                        sessionStorage.setItem(`att_${currentDay}_${currentPeriod}_${studentId}`, data.status);
                        sessionStorage.setItem(`rem_${currentDay}_${currentPeriod}_${studentId}`, data.remark || "");
                    });
                    sessionStorage.setItem(cacheKey, 'true');
                    renderAttendance();
                }
            } catch (error) {
                console.error('Fetch error:', error);
                if (error.name === 'AbortError') {
                    showAlert(`${roomName}반 데이터를 불러오지 못했습니다. 명단 갱신 버튼을 다시 눌러주세요.`);
                }
            } finally {
                fetchingRooms.delete(roomName);
                if (fetchingRooms.size === 0) {
                    hideLoading();
                }
            }
        }

        async function saveSingleStudentToSheet(studentId, roomName) {
            const gasUrl = document.getElementById('gasUrl').value.trim();
            if (!gasUrl) return;

            const student = globalData.find(s => s.학번 === studentId);
            if (!student) return;

            const status = sessionStorage.getItem(`att_${currentDay}_${currentPeriod}_${studentId}`) === 'true';
            const remark = sessionStorage.getItem(`rem_${currentDay}_${currentPeriod}_${studentId}`) || "";

            const payload = {
                type: "single",
                date: getTodayDateString(),
                day: currentDay,
                period: currentPeriod + '교시',
                room: roomName,
                supervisor: typeof supervisorName !== 'undefined' ? supervisorName : "",
                student: {
                    id: studentId,
                    name: student.이름,
                    status: status,
                    remark: remark
                }
            };

            // 토스트 메시지 작게 표시 (실시간 저장 효과)
            const indicator = document.createElement('div');
            indicator.style.cssText = 'position:fixed;bottom:100px;right:20px;background:rgba(17,138,142,0.9);backdrop-filter:blur(4px);color:white;padding:6px 16px;border-radius:20px;font-size:0.8rem;z-index:9999;pointer-events:none;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:6px;';
            indicator.innerHTML = `<span>💾</span> ${student.이름} 저장 중...`;
            document.body.appendChild(indicator);

            try {
                await fetch(gasUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                indicator.innerHTML = `<span>✅</span> ${student.이름} 완료`;
                setTimeout(() => { if (indicator.parentNode) indicator.parentNode.removeChild(indicator); }, 1500);
            } catch (error) {
                console.error('Single save error:', error);
                indicator.style.background = '#ef4444';
                indicator.innerHTML = '❌ 저장 실패';
                setTimeout(() => { if (indicator.parentNode) indicator.parentNode.removeChild(indicator); }, 3000);
            }
        }
        function renderAttendance() {
            const display = document.getElementById('attendanceDisplay');
            display.innerHTML = '';

            // 교시 선택 UI
            const periodSelector = document.createElement('div');
            periodSelector.id = 'periodButtons';
            periodSelector.style.cssText = 'display:flex;gap:4px;margin-bottom:20px;justify-content:center;width:fit-content;margin-left:auto;margin-right:auto;';
            periodSelector.innerHTML = `
                <button class="btn day-btn ${currentPeriod === '1' ? 'active' : ''}" data-period="1" onclick="selectPeriod(this)">1교시</button>
                <button class="btn day-btn ${currentPeriod === '2' ? 'active' : ''}" data-period="2" onclick="selectPeriod(this)">2교시</button>
            `;
            display.appendChild(periodSelector);

            const roomStudents = getRoomStudents(currentDay);
            const rooms = ['2-3', '2-4', '2-5', '2-6'];

            // 현재 실제 요일 계산 (0: 일요일, 1: 월요일, ..., 6: 토요일)
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const todayIndex = new Date().getDay();
            const actualToday = daysMap[todayIndex];
            const isToday = currentDay === actualToday;


            rooms.forEach(roomName => {
                const students = roomStudents[roomName].filter(s => s[`${currentDay}${currentPeriod}`] === '1');
                if (students.length === 0) return;

                // 해당 반의 데이터를 서버에서 아직 안 불러왔다면 백그라운드에서 불러오기 시작
                const dateStr = getTodayDateString();
                const cacheKey = `synced_${dateStr}_${currentDay}_${currentPeriod}_${roomName}`;
                if (!sessionStorage.getItem(cacheKey)) {
                    fetchAttendanceFromSheet(roomName);
                }

                const section = document.createElement('div');
                section.className = 'attendance-section';
                section.innerHTML = `
                    <div class="classroom-header" style="flex-wrap: wrap; gap: 12px;">
                        <span class="room-title" style="word-break: keep-all; font-size: clamp(1.6rem, 5vw, 2.1rem); line-height: 1.2;">${roomName}반 출석부 (${currentPeriod}교시)</span>
                        <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap; width: 100%; justify-content: flex-start; margin-top: 5px;">
                            <button class="btn" style="padding:6px 14px; font-size:0.85rem;" onclick="sessionStorage.removeItem('${cacheKey}'); fetchAttendanceFromSheet('${roomName}')">🔄 명단 갱신</button>
                            <span class="room-meta">${currentDay}요일 | 총 ${students.length}명</span>
                        </div>
                    </div>
                    <div class="table-responsive" style="overflow-x: auto; margin-top: 15px;">
                        <table class="attendance-table">
                            <thead>
                                <tr>
                                    <th class="col-num">번호</th>
                                    <th class="col-id">학번</th>
                                    <th class="col-name">이름</th>
                                    <th class="col-check">출석여부</th>
                                    <th class="col-remark">비고</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${students.map((s, idx) => {
                    const stateKey = `att_${currentDay}_${currentPeriod}_${s.학번}`;
                    const remarkKey = `rem_${currentDay}_${currentPeriod}_${s.학번}`;
                    const isChecked = sessionStorage.getItem(stateKey) === 'true';
                    const remarkValue = sessionStorage.getItem(remarkKey) || '';
                    return `
                                    <tr style="${!isToday ? 'opacity: 0.6; background-color: #f8fafc;' : ''}">
                                        <td>${idx + 1}</td>
                                        <td>${s.학번}</td>
                                        <td style="font-weight: 700;">${s.이름}</td>
                                        <td><input type="checkbox" class="attendance-checkbox" data-id="${s.학번}" ${isChecked ? 'checked' : ''} ${!isToday ? 'disabled' : ''} onchange="sessionStorage.setItem('${stateKey}', this.checked)"></td>
                                        <td><input type="text" class="attendance-remark" data-id="${s.학번}" value="${remarkValue}" placeholder="비고 입력" ${!isToday ? 'disabled' : ''} onchange="sessionStorage.setItem('${remarkKey}', this.value)"></td>
                                    </tr>
                                    `;
                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    ${!isToday ? `<div style="color: #ef4444; font-size: 0.9rem; margin-top: 15px; text-align: center; font-weight: 600;">⚠️ 오늘은 ${actualToday}요일입니다. ${currentDay}요일 출석체크는 불가능합니다.</div>` : ''}
                    <button class="btn-save-sheet" onclick="saveAttendanceToSheet('${roomName}', this)" ${!isToday ? 'disabled style="background: #9ca3af; cursor: not-allowed;"' : ''}>💾 ${currentPeriod}교시 ${roomName}반 전체 동기화/저장</button>
                `;
                display.appendChild(section);
            });
        }

        async function saveAttendanceToSheet(roomName, btn) {
            // 이중 안전 장치: 다시 한번 현재 요일 확인
            const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
            const actualToday = daysMap[new Date().getDay()];
            if (currentDay !== actualToday) {
                showAlert(`오늘은 ${actualToday}요일입니다. ${currentDay}요일 출석체크는 불가능합니다.`);
                return;
            }

            const gasUrl = document.getElementById('gasUrl').value.trim();
            const gasBackupInput = document.getElementById('gasBackupUrl');
            const gasBackupUrl = gasBackupInput ? gasBackupInput.value.trim() : '';

            if (!gasUrl) {
                showAlert('먼저 Google Apps Script URL을 입력해주세요.');
                return;
            }

            showConfirm(`${roomName}반 출석 데이터를 Google 시트로 전송하시겠습니까?`, async () => {

                const roomStudents = getRoomStudents(currentDay)[roomName].filter(s => s[`${currentDay}${currentPeriod}`] === '1');
                const section = btn.closest('.attendance-section');
                const checkboxes = section.querySelectorAll('.attendance-checkbox');

                const attendanceData = {
                    date: getTodayDateString(),
                    day: currentDay,
                    period: currentPeriod + '교시',
                    room: roomName,
                    supervisor: supervisorName, // 감독 교사 데이터 추가
                    students: roomStudents.map((s, idx) => {
                        const checkbox = section.querySelector(`.attendance-checkbox[data-id="${s.학번}"]`);
                        const remarkInput = section.querySelector(`.attendance-remark[data-id="${s.학번}"]`);
                        return {
                            id: s.학번,
                            name: s.이름,
                            status: checkbox ? checkbox.checked : false,
                            remark: remarkInput ? remarkInput.value : ""
                        };
                    })
                };

                const originalText = btn.innerText;
                btn.disabled = true;
                btn.innerText = '⌛ 전송 중...';

                try {
                    const requests = [];

                    // 메인 시트 전송 요청
                    requests.push(
                        fetch(gasUrl, {
                            method: 'POST',
                            mode: 'no-cors', // GAS web apps often require no-cors for simple requests from different origins
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(attendanceData)
                        })
                    );

                    // 백업 시트 전송 요청 (URL이 올바르게 설정된 경우)
                    if (gasBackupUrl && gasBackupUrl !== "여기에_백업용_앱스스크립트_URL_입력") {
                        requests.push(
                            fetch(gasBackupUrl, {
                                method: 'POST',
                                mode: 'no-cors',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify(attendanceData)
                            })
                        );
                    }

                    await Promise.all(requests);

                    // Note: with no-cors, we won't be able to read the response object, but we can assume success if no error is thrown
                    showAlert(`${roomName}반 데이터 전송 완료! (구글 시트에서 확인해 주세요)`);
                } catch (error) {
                    console.error('Error saving to sheet:', error);
                    showAlert('전송 중 오류가 발생했습니다. 콘솔 로그를 확인해 주세요.');
                } finally {
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            });
        }

        // 요일 버튼 초기 활성화
        const activeBtn = document.querySelector(`.day-btn[data-day="${currentDay}"]`);
        if (activeBtn) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        // Removed createPetals to match the new minimalist theme
        // function createPetals() { ... }


        renderSeating();
    </script>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker registered!', reg);
                        // 새로운 서비스 워커가 업데이트되었을 때 자동 새로고침
                        reg.onupdatefound = () => {
                            const newWorker = reg.installing;
                            newWorker.onstatechange = () => {
                                if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                                    location.reload();
                                }
                            };
                        };
                    })
                    .catch(err => console.log('Service Worker registration failed:', err));
            });

            // 제어권이 변경되었을 때(새로운 SW 활성화 시) 새로고침
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        }
    </script>
</body>
